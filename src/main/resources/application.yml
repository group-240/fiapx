spring:
  application:
    name: fiapx
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fiapx}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 500MB
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASSWORD:admin123}

# Swagger/OpenAPI configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

server:
  port: 8888
  servlet:
    context-path: /api

# Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

# Logging - Configuração detalhada em logback-spring.xml (JSON estruturado para CloudWatch)
logging:
  level:
    root: INFO
    com.fiap.techchallenge: INFO

# AWS
aws:
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket: ${S3_BUCKET}

rabbitmq:
  queue: ${RABBITMQ_QUEUE:video-processing-queue}
  exchange: ${RABBITMQ_EXCHANGE:video-processing-exchange}
  routing-key: ${RABBITMQ_ROUTING_KEY:video.processing}

# Configurações de Capturas de Vídeo
capturas:
  max-video-size: ${CAPTURAS_MAX_VIDEO_SIZE:100}  # Tamanho máximo em MB