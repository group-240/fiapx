apiVersion: apps/v1
kind: Deployment
metadata:
  name: fiapx
  namespace: fiapx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fiapx
  template:
    metadata:
      labels:
        app: fiapx
    spec:
      serviceAccountName: fiapx-sa
      containers:
        - name: fiapx
          image: PLACEHOLDER_ECR_URL/fiapx:latest
          ports:
            - containerPort: 8888
          envFrom:
            - secretRef:
                name: fiapx-secrets
          env:
            - name: SERVER_PORT
              value: "8888"
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: 8888
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: 8888
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: fiapx
  namespace: fiapx
spec:
  selector:
    app: fiapx
  ports:
    - protocol: TCP
      port: 8888
      targetPort: 8888
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fiapx-hpa
  namespace: fiapx
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fiapx
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
